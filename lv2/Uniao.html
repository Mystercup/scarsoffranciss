<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>União - ?</title>
    <link rel="stylesheet" href="stylelv2.css">
    <style>
        .foto-aba img, #img-popup { cursor: pointer; }
        #painel-numerico {
            position: fixed; right: 30px; top: 50%;
            transform: translateY(-50%); width: 320px; 
            background: linear-gradient(145, #1a1a1a, #000);
            border: 2px solid #FFD700; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
            z-index: 1000; box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            border-radius: 8px;
        }
        #display-senha {
            width: 100%; height: 70px; background: #000;
            border: 1px solid #4d3d00; color: #FFD700;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace; font-size: 18px; 
            letter-spacing: 2px; text-align: center;
            box-sizing: border-box; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .grade-teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn-tecla {
            padding: 18px; background: #111; border: 1px solid #4d3d00;
            color: #FFD700; cursor: pointer; font-family: 'Courier New', monospace;
            font-size: 20px; transition: all 0.2s;
        }
        .btn-tecla:hover { background: #4d3d00; box-shadow: 0 0 10px #FFD700; }
        .btn-enter-teclado {
            grid-column: span 3; padding: 18px; background: #4d3d00;
            color: #FFD700; border: 1px solid #FFD700; cursor: pointer;
            text-transform: uppercase; font-weight: bold; letter-spacing: 3px;
        }
        .btn-enter-teclado:hover { background: #FFD700; color: black; }
    </style>
</head>
<body> <div class="layout-wrapper">
        <div class="painel-botoes-laterais">
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/1ag.png', true)">ANALISAR I</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/2ag.png', true)">ANALISAR II</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/3ag.png', true)">ANALISAR III</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/4ag.png', true)">ANALISAR IV</button>
        </div>
        <div class="container-fotos">
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/1l.png', false)"><img src="../images/lv1/1l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/2l.png', false)"><img src="../images/lv1/2l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/3l.png', false)"><img src="../images/lv1/3l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/4l.png', false)"><img src="../images/lv1/4l.png"></div>
        </div>
    </div>

    <div id="painel-numerico">
        <div id="display-senha">____ ____ ____ ____</div>
        <div class="grade-teclado">
            <button class="btn-tecla" onclick="inputPainel('1')">1</button>
            <button class="btn-tecla" onclick="inputPainel('2')">2</button>
            <button class="btn-tecla" onclick="inputPainel('3')">3</button>
            <button class="btn-tecla" onclick="inputPainel('4')">4</button>
            <button class="btn-tecla" onclick="inputPainel('5')">5</button>
            <button class="btn-tecla" onclick="inputPainel('6')">6</button>
            <button class="btn-tecla" onclick="inputPainel('7')">7</button>
            <button class="btn-tecla" onclick="inputPainel('8')">8</button>
            <button class="btn-tecla" onclick="inputPainel('9')">9</button>
            <button class="btn-tecla" style="grid-column: span 3" onclick="inputPainel('0')">0</button>
            <button class="btn-enter-teclado" onclick="validarPainel()">Enter</button>
        </div>
    </div>

    <div id="modal-container">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharPopup()">&times;</span>
            <img id="img-popup" src="" alt="Análise Detalhada">
        </div>
    </div>

    <div class="texto-central">
        <p>Um local representado pela uniao... ou nem tanto, as 14 horas tudo pode ocorrer</p>
    </div>

    <button class="btn-voltar" onclick="window.location.href='../lv1/access_level_1.html'">voltar para sala de informações</button>

    <audio id="musica-uniao" loop><source src="../music/Aylexmusic.mp3" type="audio/mpeg"></audio>
    <audio id="som-clique"><source src="../music/open.mp3" type="audio/mpeg"></audio>

    <script src="script2.js"></script>
    <script>
        const musica = document.getElementById("musica-uniao");
        const somClique = document.getElementById("som-clique");
        const modal = document.getElementById("modal-container");
        const imgPopup = document.getElementById("img-popup");

        musica.volume = 0.1; 
        somClique.volume = 0.4;

        document.addEventListener("click", () => { 
            if(musica.paused) musica.play(); 
        }, { once: true });

        function abrirPopup(caminhoImagem, tocarSom) {
            if (tocarSom) { 
                somClique.currentTime = 0; 
                somClique.play(); 
            }
            imgPopup.src = caminhoImagem; 
            modal.style.display = "flex";
        }

        function fecharPopup() { 
            modal.style.display = "none"; 
            imgPopup.src = ""; 
        }

        window.onclick = function(event) { 
            if (event.target == modal) fecharPopup(); 
        }

        // BLOQUEIO INTELIGENTE: Permite botão direito APENAS em imagens
        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName !== 'IMG') {
                e.preventDefault();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key==='u' || e.key==='i' || e.key==='s')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
    </script>
</body>
</html>
