<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>União - ?</title>
    <link rel="stylesheet" href="stylelv2.css">
    <style>
        /* Cursor pointer para indicar que a imagem é interativa */
        .foto-aba img, #img-popup {
            cursor: pointer;
        }
    </style>
</head>
<body> <div class="layout-wrapper">
        <div class="painel-botoes-laterais">
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/1ag.png', true)">ANALISAR I</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/2ag.png', true)">ANALISAR II</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/3ag.png', true)">ANALISAR III</button>
            <button class="btn-lateral" onclick="abrirPopup('../images/lv1/pop/4ag.png', true)">ANALISAR IV</button>
        </div>

        <div class="container-fotos">
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/1l.png', false)"><img src="../images/lv1/1l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/2l.png', false)"><img src="../images/lv1/2l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/3l.png', false)"><img src="../images/lv1/3l.png"></div>
            <div class="foto-aba" onclick="abrirPopup('../images/lv1/4l.png', false)"><img src="../images/lv1/4l.png"></div>
        </div>
    </div>

    <div id="modal-container">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharPopup()">&times;</span>
            <img id="img-popup" src="" alt="Análise Detalhada">
        </div>
    </div>

    <div class="texto-central">
        <p>Um local representado pela uniao... ou nem tanto, as 14 horas tudo pode ocorrer</p>
    </div>

    <button class="btn-voltar" onclick="window.location.href='../lv1/access_level_1.html'">voltar para sala de informações</button>

    <audio id="musica-uniao" loop><source src="../music/Aylexmusic.mp3" type="audio/mpeg"></audio>
    <audio id="som-clique"><source src="../music/open.mp3" type="audio/mpeg"></audio>

    <script>
        const musica = document.getElementById("musica-uniao");
        const somClique = document.getElementById("som-clique");
        musica.volume = 0.1; somClique.volume = 0.4;
        document.addEventListener("click", () => { if(musica.paused) musica.play(); }, { once: true });

        const modal = document.getElementById("modal-container");
        const imgPopup = document.getElementById("img-popup");

        function abrirPopup(caminhoImagem, tocarSom) {
            if (tocarSom) { somClique.currentTime = 0; somClique.play(); }
            imgPopup.src = caminhoImagem; modal.style.display = "flex";
        }
        function fecharPopup() { modal.style.display = "none"; imgPopup.src = ""; }
        window.onclick = function(event) { if (event.target == modal) fecharPopup(); }

        // --- LÓGICA DO MENU DE CONTEXTO ---
        document.addEventListener('contextmenu', function(e) {
            // Se o elemento clicado for uma imagem, permite o menu (download)
            if (e.target.tagName === 'IMG') {
                return true; 
            } else {
                // Caso contrário, bloqueia o botão direito no resto da página
                e.preventDefault();
            }
        });

        // BLOQUEIO DE TECLADO
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key==='c' || e.key==='u' || e.key==='i' || e.key==='s')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
