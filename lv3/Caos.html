<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>O Tempo Esgota</title>
    <link rel="stylesheet" href="stylelv3.css">
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <audio id="bg-music" loop preload="auto">
        <source src="../music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>

    <div class="caixa-contador">
        <div id="status-txt" class="titulo-contador">PROCESSO TRAVADO POR:</div>
        
        <div id="timer">00:00:00:00</div>
        
        <div id="msg" class="mensagem-final">PROCESSO LIBERADO</div>
    </div>

    <script src="scriptlv3.js"></script>

    <script>
        (function() {
            const body = document.body;
            const musica = document.getElementById('bg-music');

            document.fonts.ready.then(() => {
                body.classList.add('sistema-pronto');
            });

            setTimeout(() => {
                if (!body.classList.contains('sistema-pronto')) {
                    body.classList.add('sistema-pronto');
                }
            }, 2000);

            const iniciarAudio = () => {
                if (musica) {
                    musica.volume = 0.3;
                    musica.play().catch(() => {});
                }
                window.removeEventListener('click', iniciarAudio);
                window.removeEventListener('mousemove', iniciarAudio);
                window.removeEventListener('keydown', iniciarAudio);
            };

            window.addEventListener('click', iniciarAudio);
            window.addEventListener('mousemove', iniciarAudio);
            window.addEventListener('keydown', iniciarAudio);

            document.addEventListener('keydown', (e) => {
                if (e.keyCode === 123 || (e.ctrlKey && [67, 85, 83, 73].includes(e.keyCode))) {
                    e.preventDefault();
                }
            });
        })();
    </script>
    
</body>
</html>
