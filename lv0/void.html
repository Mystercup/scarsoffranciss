<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>void</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: black;
            color: #FFD700;
            user-select: none;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        
        #interacao-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,1); 
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .aviso-entrada {
            font-family: serif;
            font-size: 14px;
            letter-spacing: 4px;
            opacity: 0.5;
            animation: pulsar 2s infinite;
        }

        @keyframes pulsar {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }

        .void-texto {
            pointer-events: none;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
            z-index: 1;
        }

        .invisible-text {
            display: block;
            color: black; 
            user-select: text;
            pointer-events: auto;
            cursor: text;
            margin-top: 20px;
        }

        .botao-voltar-container {
            margin-top: 50px;
            z-index: 2;
        }

        button.botao-voltar {
            background: transparent;
            border: 1px solid #4d3d00;
            color: #FFD700;
            padding: 10px 20px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: 0.5s;
        }

        button.botao-voltar:hover {
            background: #FFD700;
            color: black;
            box-shadow: 0 0 15px #FFD700;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="interacao-inicial" onclick="iniciarTudo()">
        <div class="aviso-entrada">[ CLIQUE PARA OUVIR O ECO ]</div>
    </div>

    <audio id="musica" loop preload="auto">
        <source src="../music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>
    
    <div class="void-texto">
        “Os mortos nao retornam como corpos, mas como ecos memorias que se recusam a morrer, repetindo eternamente aquilo que nunca foi resolvido.” 
        <span class="invisible-text">e o meu mesmo vivo, ressoara eternamente em seu corpo Nathan</span>
    </div>

    <div class="botao-voltar-container">
        <button class="botao-voltar" onclick="window.location.href='../index.html'">Acorde</button>
    </div>

    <script>
        const musica = document.getElementById("musica");
        const overlay = document.getElementById("interacao-inicial");

        function iniciarTudo() {
            
            musica.volume = 0.2;
            musica.play();

            
            overlay.style.transition = "opacity 2s ease";
            overlay.style.opacity = "0";
            
            setTimeout(() => {
                overlay.style.display = "none";
            }, 2000);
        }

        
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 67))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    

    <script>
        (function() {
            const body = document.body;
            const musica = document.getElementById('bg-music');

            document.fonts.ready.then(() => {
                body.classList.add('sistema-pronto');
            });

            setTimeout(() => {
                if (!body.classList.contains('sistema-pronto')) {
                    body.classList.add('sistema-pronto');
                }
            }, 2000);

            const iniciarAudio = () => {
                if (musica) {
                    musica.volume = 0.3;
                    musica.play().catch(() => {});
                }
                window.removeEventListener('click', iniciarAudio);
                window.removeEventListener('mousemove', iniciarAudio);
                window.removeEventListener('keydown', iniciarAudio);
            };

            window.addEventListener('click', iniciarAudio);
            window.addEventListener('mousemove', iniciarAudio);
            window.addEventListener('keydown', iniciarAudio);

            document.addEventListener('keydown', (e) => {
                if (e.keyCode === 123 || (e.ctrlKey && [67, 85, 83, 73].includes(e.keyCode))) {
                    e.preventDefault();
                }
            });
        })();
    </script>
</body>
</html>
