<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>void</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
    <audio id="musica" autoplay loop muted>
        <source src="../music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        const musica = document.getElementById("musica");
        musica.volume = 0.2;


        window.addEventListener("load", () => {
            musica.muted = false;
            musica.play().catch(e => {
                console.log("Autoplay bloqueado pelo navegador");
            });
        });
    </script>
    
    <!-- Crédito da música 
    Música: Tension Rising - Aylex
    Fonte: https://freetouse.com/music/aylex
    -->

   
    <div class="void-texto">
        “Os mortos nao retornam como corpos, mas como ecos memorias que se recusam a morrer, repetindo eternamente aquilo que nunca foi resolvido.” 
        <span class="invisible-text">e o meu mesmo vivo, ressoara eternamente em seu corpo Nathan</span>
    </div>

  
    <div class="botao-voltar-container">
        <button class="botao-voltar" onclick="window.location.href='ScarsofFranciss.html'">Acorde</button>
    </div>

    <script>
        const musica = document.getElementById("musica");
        musica.volume = 0.2;

        document.addEventListener("click", () => {
            musica.play();
        }, { once: true });
    </script>

</body>
</html>
