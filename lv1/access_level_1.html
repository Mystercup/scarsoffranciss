<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Access Buttons</title>
    <link rel="stylesheet" href="stylelv1.css">
</head>
<body>


    <audio id="musica" autoplay loop muted>
        <source src="../music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        const musica = document.getElementById("musica");
        musica.volume = 0.2;


        window.addEventListener("load", () => {
            musica.muted = false;
            musica.play().catch(e => {
                console.log("Autoplay bloqueado pelo navegador");
            });
        });
    </script>
    
        <!-- Crédito da música 
    Música: Tension Rising - Aylex
    Fonte: https://freetouse.com/music/aylex
    -->

    <div class="container">

        <h1 class="titulo">Escolha um Nivel</h1>

        <div class="botoes-container">
            <button onclick="abrirPagina('../lv2/Uniao.html', false)">Uniao</button>
            <button onclick="abrirPagina('../lv/Astralyn.html', false)">Astralyn</button>

            <button onclick="abrirPagina('../lv/Inferno.html', true, 'senha3')">Inferno</button>
            <button onclick="abrirPagina('../lv/Caos_e_Razao.html', true, 'senha4')">Caos e Razao</button>
            <button onclick="abrirPagina('../lv/Aphatelia.html', true, 'senha5')">Aphatelia</button>
            <button onclick="abrirPagina('../lv/ataxia.html', true, 'senha6')">ataxia</button>
            <button onclick="abrirPagina('../lv/apatheia.html', true, 'senha7')">apatheia</button>
            <button onclick="abrirPagina('../lv/Ergon.html', true, 'senha8')">Ergon</button>
            <button onclick="abrirPagina('../lv/Telos.html', true, 'senha9')">Telos</button>
            <button onclick="abrirPagina('../lv/Eudaimonia.html', true, 'senha10')">Eudaimonia</button>
            <button onclick="abrirPagina('../lv/Dynamis.html', true, 'senha11')">Dynamis</button>
            <button onclick="abrirPagina('../lv/Acedia.html', true, 'senha12')">Acedia</button>
        </div>

    </div>

    <script src="Scriptlv1.js"></script>
</body>
</html>
