<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1 de acesso</title>
    <link rel="stylesheet" href="stylelv1.css">
</head>
<body oncontextmenu="return false;">

    <audio id="musica" autoplay loop muted><source src="../music/Aylexmusic.mp3" type="audio/mpeg"></audio>
    <audio id="som-risada"><source src="../music/laught.mp3" type="audio/mpeg"></audio>

    <div class="container">
        <div id="feedback-tradutor">
            <div id="contador" class="contador-runa"></div>
            <div id="frase-sorteada" class="frase-runa"></div>
        </div>

        <div class="tradutor-topo" id="campo-tradutor"></div>

        <h1 class="titulo">Escolha um Nivel</h1>
        
        <div class="botoes-container">
            <button onclick="abrirPagina('../lv2/Uniao.html', false)">Uniao</button>
            <button onclick="abrirPagina('../lv2_5/Astralyn.html', false)">Astralyn</button>
            <button onclick="abrirPagina('../lv/Caos.html', true, 'senha3')">Caos</button>
            <button onclick="abrirPagina('../lv/Aphatelia.html', true, 'senha4')">Aphatelia</button>
            <button onclick="abrirPagina('../lv/ataxia.html', true, 'senha5')">ataxia</button>
            <button onclick="abrirPagina('../lv/apatheia.html', true, 'senha6')">apatheia</button>
            <button onclick="abrirPagina('../lv/Ergon.html', true, 'senha7')">Ergon</button>
            <button onclick="abrirPagina('../lv/Telos.html', true, 'senha8')">Telos</button>
            <button onclick="abrirPagina('../lv/Eudaimonia.html', true, 'senha9')">Eudaimonia</button>
            <button onclick="abrirPagina('../lv/Dynamis.html', true, 'senha10')">Dynamis</button>
            <button onclick="abrirPagina('../lv/Acedia.html', true, 'senha11')">Acedia</button>
            <button onclick="abrirPagina('../lv/Katabasis.html', true, 'senha12')">Katabasis</button>
        </div>
    </div>

    <div id="modal-senha" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: #0a0a0a; border: 1px solid #333; padding: 40px; text-align: center; max-width: 450px;">
            <p style="color: #ccc; font-size: 18px; margin-bottom: 25px; line-height: 1.6; font-family: 'FonteSecundaria', Arial, sans-serif;"><span style="color: #FFD700; font-weight: bold;">? -</span> O acesso exige um sacrificio de conhecimento.</p>
            <input type="password" id="input-modal" style="background: #111; border: 1px solid #444; color: white; padding: 12px; width: 80%; margin-bottom: 25px; outline: none; text-align: center;">
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button onclick="tocarRisada()" style="background: transparent; border: 1px solid #444; color: #777; width: 140px; height: 45px; cursor: pointer; font-family: 'FonteSecundaria', Arial, sans-serif;">Abandono</button>
                <button onclick="confirmarSenha()" style="background: #222; border: 1px solid #FFD700; color: #FFD700; width: 140px; height: 45px; cursor: pointer; font-family: 'MinecraftEnchant', Arial, sans-serif;">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="Scriptlv1.js"></script>
    <script>
        const alfabeto = "abcdefghijklmnopqrstuvwxyz".split("");
        const segredo = "kuzonam";
        let digitado = "";
        
        const frasesMisterio = ["O rei observa...", "A coroa esta vazia.", "As paredes sussurram.", "Fragmento de alma."];
        const containerTradutor = document.getElementById("campo-tradutor");
        const displayContador = document.getElementById("contador");
        const displayFrase = document.getElementById("frase-sorteada");

        // Gerador de teclado rúnico
        alfabeto.forEach(letra => {
            const btn = document.createElement("button");
            btn.className = "btn-runa";
            btn.innerText = letra;
            btn.onclick = () => {
                digitado += letra;
                displayContador.innerText = `${digitado.length} / 7`;
                displayFrase.innerText = frasesMisterio[Math.floor(Math.random() * frasesMisterio.length)];

                if (digitado.length === 7) {
                    if (digitado === segredo) {
                        window.location.href = "rei.html";
                    } else {
                        gerarErroCaotico("patetico como nao me reconhece  ?");
                        digitado = "";
                        setTimeout(() => {
                            displayContador.innerText = "";
                            displayFrase.innerText = "";
                        }, 500);
                    }
                }
            };
            containerTradutor.appendChild(btn);
        });

        function gerarErroCaotico(texto) {
            const containerErro = document.createElement("div");
            containerErro.className = "erro-container-aleatorio";
            
            
            texto.split("").forEach(letra => {
                const span = document.createElement("span");
                span.innerHTML = letra === " " ? "&nbsp;" : letra;
                
                span.style.animationDuration = (0.05 + Math.random() * 0.1) + "s";
                containerErro.appendChild(span);
            });

            const x = Math.random() * (window.innerWidth - 450);
            const y = Math.random() * (window.innerHeight - 50);
            
            containerErro.style.left = x + "px";
            containerErro.style.top = y + "px";
            
            document.body.appendChild(containerErro);
            setTimeout(() => containerErro.remove(), 2500);
        }

        
        const musica = document.getElementById("musica");
        const risada = document.getElementById("som-risada");
        musica.volume = 0.2; risada.volume = 0.6;
        
        window.addEventListener("load", () => { 
            musica.muted = false; 
            musica.play().catch(e => {}); 
        });

        function tocarRisada() {
            risada.currentTime = 0; 
            risada.play();
            setTimeout(() => { document.getElementById('modal-senha').style.display = 'none'; }, 500); 
        }

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'u', 'i', 's'].includes(e.key)) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
    </script>

    <script>
        (function() {
            const body = document.body;
            const musica = document.getElementById('bg-music');

            document.fonts.ready.then(() => {
                body.classList.add('sistema-pronto');
            });

            setTimeout(() => {
                if (!body.classList.contains('sistema-pronto')) {
                    body.classList.add('sistema-pronto');
                }
            }, 2000);

            const iniciarAudio = () => {
                if (musica) {
                    musica.volume = 0.3;
                    musica.play().catch(() => {});
                }
                window.removeEventListener('click', iniciarAudio);
                window.removeEventListener('mousemove', iniciarAudio);
                window.removeEventListener('keydown', iniciarAudio);
            };

            window.addEventListener('click', iniciarAudio);
            window.addEventListener('mousemove', iniciarAudio);
            window.addEventListener('keydown', iniciarAudio);

            document.addEventListener('keydown', (e) => {
                if (e.keyCode === 123 || (e.ctrlKey && [67, 85, 83, 73].includes(e.keyCode))) {
                    e.preventDefault();
                }
            });
        })();
    </script>
</body>
</html>
