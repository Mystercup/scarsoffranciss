<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>:D</title>
    <style>
        @font-face {
            font-family: 'MinecraftEnchant';
            src: url('../fonte/mc.ttf') format('truetype');
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFD700;
            
            
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #gif-container {
            position: relative;
            z-index: 1;
            width: 70vw; 
            max-width: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 80%);
            mask-image: radial-gradient(circle, black 40%, transparent 80%);
            -webkit-mask-size: cover;
            mask-size: cover;
            pointer-events: none; 
        }

        #gif-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: brightness(0.7) contrast(1.2); 
            opacity: 0.8;
            -webkit-user-drag: none; 
        }

        @keyframes tremorLetra {
            0%   { transform: translate(1px, 1px); }
            50%  { transform: translate(-1.1px, -1.1px); }
            100% { transform: translate(1px, -1px); }
        }

        .mensagem-caotica {
            position: fixed;
            color: #FFD700;
            font-family: 'MinecraftEnchant', sans-serif;
            font-size: 26px;
            text-shadow: 0 0 10px #FFD700; 
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        .letra {
            display: inline-block;
            animation: tremorLetra 0.1s infinite linear;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="gif-container">
        <img src="../images/iseeyou.gif" alt="Vazio">
    </div>

    <audio id="musica-void" loop>
        <source src="../music/glitch.mp3" type="audio/mpeg">
    </audio>

    <script>
        const musica = document.getElementById("musica-void");
        musica.volume = 0.1; 

        document.addEventListener("click", () => {
            musica.play();
        }, { once: true });

        const MENSAGENS = [
            "VOCE NAO DEVERIA ESTAR AQUI",
            "O VAZIO IRA CONSUMIR SUA MENTE",
            "NAO HA VOLTA",
            "EU VEJO VOCE",
            "BUSCA CONHECIMENTO",
            "CRIANCA TOLA",
            "ESTA OUVINDO ME OUVINDO FALAR?",
            "VOCE JA ESTA MORTO",
            "O QUE FAZ POR AQUI",
            "NENHUM CAMINHO LEVA A MIM",
            "QUANTAS VEZES TENHO QUE EXPLICAR",
            "HUMANOS",
            "MORTOS VENHAM A MIM",
            "FALACIAS",
            "DEUSES"
        ];

        function criarMensagem() {
            const container = document.createElement("div");
            container.className = "mensagem-caotica";
            const texto = MENSAGENS[Math.floor(Math.random() * MENSAGENS.length)];
            
            texto.split('').forEach(char => {
                const span = document.createElement("span");
                span.className = "letra";
                span.innerHTML = char === " " ? "&nbsp;" : char;
                span.style.animationDelay = (Math.random() * 0.2) + "s";
                container.appendChild(span);
            });

            container.style.left = (Math.random() * 60 + 5) + "%";
            container.style.top = (Math.random() * 70 + 10) + "%";

            document.body.appendChild(container);

            setTimeout(() => {
                container.style.transition = "opacity 1.5s";
                container.style.opacity = "0";
                setTimeout(() => container.remove(), 1500);
            }, 2500);
        }

        setInterval(criarMensagem, 1500);

        // Impedir qualquer tentativa de arrastar elementos (evita o realce visual)
        document.addEventListener('dragstart', (e) => e.preventDefault());
    </script>
</body>
</html>
