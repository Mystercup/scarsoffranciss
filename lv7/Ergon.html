<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Irracionalidade</title>
    <link rel="stylesheet" href="stylelv7.css">
    <script>
        // Bloqueio de acesso direto
        if (sessionStorage.getItem("autorizacao_hub_lv0_5") !== "true") {
            window.location.replace("../lv0_5/access_level_0_5.html");
        }
    </script>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <audio id="bg-music" loop>
        <source src="../music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>

    <div class="container-central">
        <div class="input-wrapper">
            <p class="instrucao">A voz da razão emudece aqui.</p>
            <input type="text" id="input-puzzle" autocomplete="off" placeholder="...">
        </div>
    </div>

    <script>
        const musica = document.getElementById('bg-music');
        
        const iniciarInteracao = () => {
            if (musica) {
                musica.volume = 0.3;
                musica.play().catch(() => {});
            }
            window.removeEventListener('click', iniciarInteracao);
            window.removeEventListener('keydown', iniciarInteracao);
        };

        window.addEventListener('click', iniciarInteracao);
        window.addEventListener('keydown', iniciarInteracao);

        document.addEventListener('keydown', (e) => {
            // Bloquear F12 e atalhos de inspeção
            if (e.keyCode === 123 || (e.ctrlKey && [67, 85, 83, 73].includes(e.keyCode))) {
                e.preventDefault();
            }
        });

        document.getElementById('input-puzzle').focus();
    </script>
</body>
</html>
