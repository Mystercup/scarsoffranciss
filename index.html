<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inicialização</title>
    <link rel="stylesheet" href="./lv0/style.css">
    <style>
        
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        
        .encantamento span {
            display: inline-block;
            animation: flutuar_leve 4s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes flutuar_leve {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-4px); }
        }

        .espaco-letra {
            width: 10px;
        }

        
        .botao-secreto {
            position: fixed;
            top: 30px;    
            right: 30px;  
            width: 40px;   
            height: 40px;
            text-decoration: none;
            background: transparent;
            font-size: 24px; 
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; 
            color: transparent; 
            transition: opacity 0.4s ease-in-out; 
            cursor: default;
        }

        .botao-secreto:hover {
            opacity: 1; 
            cursor: pointer;
           
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <a href="./lv0/void.html" class="botao-secreto">:D</a>

    <audio id="musica" autoplay loop muted>
        <source src="./music/Aylexmusic.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <p class="encantamento" id="texto-flutuante">NAO HA VERDADE ABSOLUTA</p>
        
        <div class="linha">
            <input type="password" id="senha" placeholder="Senha">
            <button onclick="verificarSenha()">Submit</button>
        </div>
    </div>

    <p id="mensagem"></p>

    <script>
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key==='c' || e.key==='u' || e.key==='i' || e.key==='s')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });

        
        const containerTexto = document.getElementById("texto-flutuante");
        const conteudoOriginal = containerTexto.innerText;
        containerTexto.innerHTML = ""; 

        conteudoOriginal.split("").forEach(letra => {
            const span = document.createElement("span");
            if (letra === " ") {
                span.innerHTML = "&nbsp;"; 
                span.className = "espaco-letra";
            } else {
                span.innerText = letra;
                const delayAleatorio = (Math.random() * -8).toFixed(2); 
                span.style.animationDelay = `${delayAleatorio}s`;
                const duracaoAleatoria = (3 + Math.random() * 2).toFixed(2);
                span.style.animationDuration = `${duracaoAleatoria}s`;
            }
            containerTexto.appendChild(span);
        });

        
        const musica = document.getElementById("musica");
        musica.volume = 0.2;

        window.addEventListener("load", () => {
            musica.muted = false;
            musica.play().catch(e => console.log("Áudio bloqueado."));
        });

        document.addEventListener("click", () => {
            if(musica.paused) musica.play();
        }, { once: true });
    </script>

    <script src="./lv0/script.js"></script>

    <script>
        (function() {
            const body = document.body;
            const musica = document.getElementById('bg-music');

            document.fonts.ready.then(() => {
                body.classList.add('sistema-pronto');
            });

            setTimeout(() => {
                if (!body.classList.contains('sistema-pronto')) {
                    body.classList.add('sistema-pronto');
                }
            }, 2000);

            const iniciarAudio = () => {
                if (musica) {
                    musica.volume = 0.3;
                    musica.play().catch(() => {});
                }
                window.removeEventListener('click', iniciarAudio);
                window.removeEventListener('mousemove', iniciarAudio);
                window.removeEventListener('keydown', iniciarAudio);
            };

            window.addEventListener('click', iniciarAudio);
            window.addEventListener('mousemove', iniciarAudio);
            window.addEventListener('keydown', iniciarAudio);

            document.addEventListener('keydown', (e) => {
                if (e.keyCode === 123 || (e.ctrlKey && [67, 85, 83, 73].includes(e.keyCode))) {
                    e.preventDefault();
                }
            });
        })();
    </script>
    
</body>
</html>
